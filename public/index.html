

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>반려견 사주풀이 - AI 명리학 분석</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<div class="container">
  <h1>🐾 반려견 사주풀이</h1>
  <p class="subtitle">우리 아이의 타고난 기운과 성격을 AI 명리학자가 분석해드립니다.</p>

  <div class="form-group">
    <label for="name">이름</label>
    <input id="name" type="text" placeholder="아이의 이름을 입력하세요">
  </div>

  <div class="form-group">
    <label for="birthdate">생년월일</label>
    <input id="birthdate" type="date">
  </div>

  <div class="form-group">
    <label for="birthtime">출생시간</label>
    <select id="birthtime">
      <option value="unknown">모름</option>
      <option value="00:00">자시 (23시~01시)</option>
      <option value="02:00">축시 (01시~03시)</option>
      <option value="04:00">인시 (03시~05시)</option>
      <option value="06:00">묘시 (05시~07시)</option>
      <option value="08:00">진시 (07시~09시)</option>
      <option value="10:00">사시 (09시~11시)</option>
      <option value="12:00">오시 (11시~13시)</option>
      <option value="14:00">미시 (13시~15시)</option>
      <option value="16:00">신시 (15시~17시)</option>
      <option value="18:00">유시 (17시~19시)</option>
      <option value="20:00">술시 (19시~21시)</option>
      <option value="22:00">해시 (21시~23시)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="breed">견종</label>
    <input id="breed" type="text" placeholder="예: 골든 리트리버, 믹스견">
  </div>

  <div class="form-group">
    <label for="gender">성별</label>
    <select id="gender">
      <option value="male">남아</option>
      <option value="female">여아</option>
    </select>
  </div>

  <button id="analyze-btn">사주 분석 시작하기</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI 명리학자가 우주의 기운을 분석 중입니다...</p>
  </div>

  <div class="result-area" id="result-area">
    <div class="result-title">✨ 분석 결과</div>
    <div id="result-content"></div>
  </div>

  <footer>
    © 2026 반려견 사주풀이 AI. All rights reserved.
  </footer>
</div>

<script src="main.js"></script>
</body>
</html>
